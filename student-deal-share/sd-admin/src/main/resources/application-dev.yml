spring:
  datasource:
    # MariaDB 驱动 (默认使用)
    url: jdbc:mariadb://localhost:3306/student_deal_share?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: xiaoxiang
    driver-class-name: org.mariadb.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    
#     MySQL 驱动 (备用，使用时注释掉上面的 MariaDB 配置，取消下面的注释)
#     url: jdbc:mysql://localhost:3306/student_deal_share?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
#     username: root
#     password: xiaoxiang
#     driver-class-name: com.mysql.cj.jdbc.Driver
#     type: com.alibaba.druid.pool.DruidDataSource
  
  druid:
    initial-size: 5
    min-idle: 5
    max-active: 20
    max-wait: 60000
    time-between-eviction-runs-millis: 60000
    min-evictable-idle-time-millis: 300000
    validation-query: SELECT 1
    test-while-idle: true
    test-on-borrow: false
    test-on-return: false
    pool-prepared-statements: true
    max-pool-prepared-statement-per-connection-size: 20
    stat-view-servlet:
      enabled: true
      url-pattern: /druid/*
      reset-enable: false
      login-username: admin
      login-password: admin
    web-stat-filter:
      enabled: true
      url-pattern: /*
      exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"
