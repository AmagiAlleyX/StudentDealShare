server:
  port: 8080

spring:
  datasource:
    # MariaDB配置（默认使用）
    url: jdbc:mariadb://localhost:3306/campusecohub?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: xiaoxiang
    driver-class-name: org.mariadb.jdbc.Driver
    
    # MySQL配置（如需使用MySQL，请取消下面的注释并注释MariaDB配置）
#    url: jdbc:mysql://localhost:3306/campusecohub?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
#    username: root
#    password: xiaoxiang
#    driver-class-name: com.mysql.cj.jdbc.Driver
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher  # 添加这行！

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.campusecohub.model
  configuration:
    map-underscore-to-camel-case: true

pagehelper:
  # MariaDB方言（默认使用）
  helper-dialect: mariadb
  # MySQL方言（如需使用MySQL，请取消下面的注释并注释MariaDB方言）
#  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true
  params: count=countSql

knife4j:
  enable: true
  production: false